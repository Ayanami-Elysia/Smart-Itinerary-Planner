<script>
// 定义全局变量
var element;

console.log('开始加载layui组件...');

// 确保jQuery已加载
$(document).ready(function() {
    console.log('jQuery已加载，准备初始化layui...');
    
    // 使用setTimeout确保DOM已完全加载
    setTimeout(function() {
        initLayui();
    }, 100);
});

function initLayui() {
    if (typeof layui === 'undefined') {
        console.error('Layui未加载！');
        // 如果layui未加载，500ms后重试
        setTimeout(initLayui, 500);
        return;
    }
    
    console.log('开始初始化layui组件...');
    layui.use(['element', 'layer', 'form'], function() {
        console.log('Layui组件加载完成');
        
        var $ = layui.jquery;
        element = layui.element; // 赋值给全局变量
        
        console.log('Element组件:', element);
        
        // 初始化标签页
        element.init();
        
        // 标签点击事件
        $(".layui-tab-title li").click(function() {
            var layId = $(this).attr("lay-id");
            console.log('点击标签:', layId);
            element.tabChange('xbs_tab', layId);
        });
        
        // 初始化完成后触发事件
        $(document).trigger('layui-ready');
        console.log('触发layui-ready事件');
        
        // 手动调用一次iframe高度调整
        setTimeout(function() {
            resizeIframe();
            console.log('调整iframe高度');
        }, 200);
    });
}

// 菜单记忆功能
$(function(){
    // 读取本地存储的菜单状态
    var openMenus = localStorage.getItem('openMenus');
    if(openMenus){
        try {
            openMenus = JSON.parse(openMenus);
            // 打开之前保存的菜单
            for(var i = 0; i < openMenus.length; i++){
                $('.nav-menu li').eq(openMenus[i]).addClass('open').find('.sub-menu').show();
            }
        } catch(e) {
            console.log('菜单状态恢复失败');
        }
    }
    
    // 点击父菜单时切换展开状态并保存状态
    $('.nav-menu>li>a').click(function(){
        var $parent = $(this).parent();
        var isOpen = $parent.hasClass('open');
        
        // 切换菜单展开状态
        if(isOpen) {
            $parent.removeClass('open');
            $parent.find('.sub-menu').slideUp();
        } else {
            $parent.addClass('open');
            $parent.find('.sub-menu').slideDown();
        }
        
        // 保存当前打开的菜单索引
        var openIndexes = [];
        $('.nav-menu>li').each(function(index){
            if($(this).hasClass('open')){
                openIndexes.push(index);
            }
        });
        
        // 存储打开的菜单状态
        localStorage.setItem('openMenus', JSON.stringify(openIndexes));
    });
    
    // 子菜单项点击事件 - 使用标签页加载内容
    $('.menu-link').click(function(e){
        e.preventDefault(); // 阻止默认行为
        
        // 获取data属性中的标题和URL
        var title = $(this).data('title');
        var url = $(this).data('url');
        
        console.log('点击菜单:', title, url);
        
        // 检查URL是否有效
        if (!url) {
            console.error('菜单URL为空');
            return false;
        }
        
        // 处理相对路径
        if (url.indexOf('http') !== 0 && url.indexOf('/') !== 0) {
            url = '/' + url;
        }
        
        // 使用标签页加载内容
        addTab(title, url);
        
        return false;
    });
    
    // 添加标签页函数
    function addTab(title, url) {
        console.log('添加标签页:', title, url);
        
        if (!element) {
            console.error('Element组件未初始化');
            // 如果element未初始化，直接跳转
            window.location.href = url;
            return;
        }
        
        try {
            // 使用URL作为标签ID（去除特殊字符）
            var id = 'tab_' + url.replace(/[^\w]/g, '_');
            console.log('标签ID:', id);
            
            // 检查是否已存在相同的标签
            var existingTab = $('.layui-tab-title li[lay-id="' + id + '"]');
            if (existingTab.length > 0) {
                console.log('标签已存在，切换到该标签');
                // 如果标签已存在，切换到该标签
                element.tabChange('xbs_tab', id);
                return;
            }
            
            // 添加新标签
            console.log('添加新标签');
            element.tabAdd('xbs_tab', {
                title: title,

// iframe高度自适应函数
function resizeIframe() {
    try {
        console.log('调整iframe高度...');
        
        // 设置iframe高度为窗口高度减去头部和页脚的高度
        var windowHeight = $(window).height();
        var headerHeight = $(".container").outerHeight() || 60;
        var pageHeaderHeight = $(".page-header").outerHeight() || 50;
        var footerHeight = $(".page-footer").outerHeight() || 60;
        var tabTitleHeight = $(".layui-tab-title").outerHeight() || 40;
        
        console.log('窗口高度:', windowHeight);
        console.log('头部高度:', headerHeight);
        console.log('页面头部高度:', pageHeaderHeight);
        console.log('页脚高度:', footerHeight);
        console.log('标签标题高度:', tabTitleHeight);
        
        // 计算iframe应该的高度
        var iframeHeight = windowHeight - headerHeight - pageHeaderHeight - footerHeight - tabTitleHeight - 30; // 30px作为边距，增加了iframe的高度
        
        // 设置最小高度
        if (iframeHeight < 400) {
            iframeHeight = 400;
        }
        
        console.log('计算的iframe高度:', iframeHeight);
        
        // 应用高度到所有iframe
        $(".x-iframe").each(function() {
            $(this).height(iframeHeight);
            console.log('设置iframe高度:', iframeHeight);
        });
    } catch (e) {
        console.error('调整iframe高度出错:', e);
    }
}

// 窗口大小改变时调整iframe高度
$(window).resize(function() {
    resizeIframe();
});

// 页面加载完成后调整iframe高度
$(document).ready(function() {
    setTimeout(resizeIframe, 100);
});
